server {
    listen 80;
    server_name civic.dilmith.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name civic.dilmith.live;

    # ssl_certificate /etc/letsencrypt/live/civic.dilmith.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/civic.dilmith.live/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /home/ubuntu/Civic-Engagement-SE3040-Project/frontend/dist;
    index index.html;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    access_log /var/log/nginx/civic-frontend.access.log;
    error_log  /var/log/nginx/civic-frontend.error.log;
}
