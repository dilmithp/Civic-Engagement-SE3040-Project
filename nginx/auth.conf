server {
    listen 80;
    server_name auth.civic.dilmith.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.civic.dilmith.live;

    # ssl_certificate /etc/letsencrypt/live/auth.civic.dilmith.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/auth.civic.dilmith.live/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Standard timeouts
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    access_log /var/log/nginx/civic-auth.access.log;
    error_log  /var/log/nginx/civic-auth.error.log;
}
