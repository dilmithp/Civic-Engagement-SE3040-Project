server {
    listen 80;
    server_name api.civic.dilmith.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.civic.dilmith.live;

    # ssl_certificate /etc/letsencrypt/live/api.civic.dilmith.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.civic.dilmith.live/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://localhost:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Needed for file uploads (multer/cloudinary)
        client_max_body_size 20M;

        # Proxy buffer fix (prevents 502 on large responses)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    access_log /var/log/nginx/civic-backend.access.log;
    error_log  /var/log/nginx/civic-backend.error.log;
}
